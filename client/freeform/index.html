<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<title>dodian</title>
		<meta name="description"
			content="dodian — a freeform territory game. Glide out, draw a loop, and claim the land inside." />
		<meta name="theme-color" content="#0A0E14" />
		<meta property="og:title" content="dodian" />
		<meta property="og:description"
			content="Glide out, draw a loop, and the land inside is yours. Stray too far and you run blind." />
		<link rel="icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230A0E14'/><circle cx='16' cy='16' r='7.5' fill='none' stroke='%23F2B45C' stroke-width='2.5'/><circle cx='23.5' cy='16' r='2.6' fill='%23F2B45C'/></svg>" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<style>
		:root {
			--ink: #0A0E14;
			--surface: #121821;
			--chalk: #ECF1F5;
			--mist: #8593A3;
			--faint: #515C6B;
			--line: rgba(150, 170, 195, 0.12);
			--line-2: rgba(150, 170, 195, 0.22);
			--signal: #F2B45C;
			--display: "Space Grotesk", system-ui, sans-serif;
			--mono: "JetBrains Mono", ui-monospace, monospace;
		}
		* {
			box-sizing: border-box;
		}
		html,
		body {
			margin: 0;
			height: 100%;
			overflow: hidden;
			background: var(--ink);
			color: var(--chalk);
			font-family: var(--display);
		}
		#c {
			display: block;
			width: 100vw;
			height: 100vh;
			cursor: none;
			touch-action: none;
		}

		/* edge vignette — your sight fades at the periphery */
		.vignette {
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: 2;
			background: radial-gradient(120% 120% at 50% 50%, transparent 52%, rgba(5, 8, 12, 0.55) 100%);
		}

		/* survey frame + corner registration ticks */
		.frame {
			position: fixed;
			inset: 16px;
			border: 1px solid var(--line);
			pointer-events: none;
			z-index: 3;
		}
		.frame i {
			position: absolute;
			width: 11px;
			height: 11px;
			border: 1px solid var(--line-2);
		}
		.frame i.tl {
			top: -1px;
			left: -1px;
			border-right: 0;
			border-bottom: 0;
		}
		.frame i.tr {
			top: -1px;
			right: -1px;
			border-left: 0;
			border-bottom: 0;
		}
		.frame i.bl {
			bottom: -1px;
			left: -1px;
			border-right: 0;
			border-top: 0;
		}
		.frame i.br {
			bottom: -1px;
			right: -1px;
			border-left: 0;
			border-top: 0;
		}

		.panel {
			position: fixed;
			z-index: 4;
			user-select: none;
			pointer-events: none;
		}

		/* HUD */
		#hud {
			top: 30px;
			left: 34px;
		}
		#hud .lbl {
			font-family: var(--mono);
			font-size: 10px;
			letter-spacing: 0.22em;
			color: var(--mist);
			text-transform: uppercase;
		}
		#hud .area {
			font-family: var(--display);
			font-weight: 700;
			font-size: 40px;
			line-height: 1;
			color: var(--signal);
			letter-spacing: -0.02em;
			margin-top: 2px;
		}
		#hud .meta {
			font-family: var(--mono);
			font-size: 11px;
			color: var(--faint);
			margin-top: 8px;
			letter-spacing: 0.04em;
		}
		#hud .meta b {
			color: var(--mist);
			font-weight: 500;
		}

		/* live indicator */
		#live {
			top: 30px;
			right: 34px;
			font-family: var(--mono);
			font-size: 10px;
			letter-spacing: 0.22em;
			color: var(--mist);
			display: flex;
			align-items: center;
			gap: 7px;
		}
		#live .dot {
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: var(--signal);
			box-shadow: 0 0 8px var(--signal);
			animation: pulse 1.6s ease-in-out infinite;
		}
		@keyframes pulse {
			0%,
			100% {
				opacity: 1;
			}
			50% {
				opacity: 0.35;
			}
		}

		/* leaderboard */
		#lb {
			top: 64px;
			right: 34px;
			min-width: 184px;
		}
		#lb .head {
			font-family: var(--mono);
			font-size: 10px;
			letter-spacing: 0.22em;
			color: var(--mist);
			text-transform: uppercase;
			padding-bottom: 7px;
			border-bottom: 1px solid var(--line);
			margin-bottom: 7px;
			text-align: right;
		}
		#lb .row {
			display: flex;
			gap: 10px;
			font-family: var(--mono);
			font-size: 12px;
			line-height: 1.85;
		}
		#lb .row .rk {
			color: var(--faint);
			width: 18px;
		}
		#lb .row .nm {
			color: var(--chalk);
			flex: 1;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}
		#lb .row .sc {
			color: var(--mist);
		}
		#lb .row.me .nm,
		#lb .row.me .sc,
		#lb .row.me .rk {
			color: var(--signal);
		}

		/* minimap */
		#mini-wrap {
			right: 30px;
			bottom: 30px;
		}
		#mini-wrap .cap {
			font-family: var(--mono);
			font-size: 10px;
			letter-spacing: 0.22em;
			color: var(--mist);
			margin-bottom: 7px;
			text-transform: uppercase;
		}
		#mini {
			display: block;
			background: rgba(8, 12, 18, 0.6);
			border: 1px solid var(--line);
		}

		/* overlays */
		.overlay {
			position: fixed;
			inset: 0;
			z-index: 6;
			display: flex;
			flex-direction: column;
			justify-content: center;
			padding: 0 max(8vw, 40px);
			background: rgba(8, 11, 16, 0.78);
			backdrop-filter: blur(3px);
		}
		.eyebrow {
			font-family: var(--mono);
			font-size: 11px;
			letter-spacing: 0.42em;
			color: var(--mist);
			text-transform: uppercase;
			margin-bottom: 18px;
		}
		.wordmark {
			font-family: var(--display);
			font-weight: 700;
			font-size: clamp(54px, 11vw, 132px);
			line-height: 0.92;
			letter-spacing: -0.04em;
			margin: 0;
		}
		.wordmark .accent {
			color: var(--signal);
		}
		.tagline {
			font-family: var(--display);
			font-weight: 400;
			font-size: clamp(15px, 1.6vw, 19px);
			color: var(--mist);
			max-width: 30ch;
			line-height: 1.5;
			margin: 22px 0 34px;
		}
		.row {
			display: flex;
			gap: 12px;
			align-items: stretch;
			max-width: 460px;
		}
		.field {
			flex: 1;
			font-family: var(--mono);
			font-size: 15px;
			letter-spacing: 0.04em;
			padding: 0 18px;
			height: 54px;
			background: var(--surface);
			color: var(--chalk);
			border: 1px solid var(--line-2);
			outline: none;
			transition: border-color 0.18s, box-shadow 0.18s;
		}
		.field::placeholder {
			color: var(--faint);
			text-transform: uppercase;
			letter-spacing: 0.18em;
			font-size: 12px;
		}
		.field:focus {
			border-color: var(--signal);
			box-shadow: inset 0 0 0 1px var(--signal);
		}
		.cta {
			font-family: var(--mono);
			font-weight: 700;
			font-size: 13px;
			letter-spacing: 0.18em;
			text-transform: uppercase;
			padding: 0 34px;
			height: 54px;
			border: 1px solid var(--signal);
			background: var(--signal);
			color: #1A1206;
			cursor: pointer;
			transition: transform 0.12s ease, background 0.18s, color 0.18s;
		}
		.cta:hover {
			transform: translateY(-2px);
		}
		.cta:active {
			transform: translateY(0);
		}
		.cta:focus-visible {
			outline: 2px solid var(--chalk);
			outline-offset: 3px;
		}
		.cta.ghost {
			background: transparent;
			color: var(--signal);
		}
		.err {
			font-family: var(--mono);
			font-size: 12px;
			color: #E8718E;
			height: 16px;
			margin-top: 18px;
			letter-spacing: 0.04em;
		}
		.stat-label {
			font-family: var(--mono);
			font-size: 11px;
			letter-spacing: 0.22em;
			color: var(--mist);
			text-transform: uppercase;
			margin-bottom: 6px;
		}
		.dead-reason {
			font-family: var(--mono);
			font-size: 13px;
			line-height: 1.5;
			color: var(--signal);
			max-width: 34ch;
			margin: 14px auto 0;
		}
		.killcam {
			position: fixed;
			top: 58px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 6;
			text-align: center;
			pointer-events: none;
		}
		.killcam .kc-label {
			font-family: var(--mono);
			font-size: 11px;
			letter-spacing: 0.28em;
			text-transform: uppercase;
			color: var(--mist);
			margin-bottom: 6px;
		}
		.killcam .kc-name {
			font-family: var(--display);
			font-weight: 700;
			font-size: clamp(24px, 5vw, 42px);
			letter-spacing: -0.01em;
			color: var(--signal);
		}
		.killcam .kc-hint {
			font-family: var(--mono);
			font-size: 10px;
			letter-spacing: 0.22em;
			text-transform: uppercase;
			color: var(--faint);
			margin-top: 10px;
		}
		.stat-num {
			font-family: var(--display);
			font-weight: 700;
			font-size: clamp(40px, 7vw, 80px);
			line-height: 1;
			color: var(--signal);
			letter-spacing: -0.03em;
			margin-bottom: 34px;
		}
		.hidden {
			display: none !important;
		}

		/* juice: overlay entrance, death flash, kill/info toasts */
		@keyframes overlayIn {
			from {
				opacity: 0;
				transform: translateY(10px);
			}
			to {
				opacity: 1;
				transform: none;
			}
		}
		.overlay:not(.hidden) {
			animation: overlayIn 0.45s cubic-bezier(.2,.7,.2,1);
		}
		#flash {
			position: fixed;
			inset: 0;
			z-index: 5;
			pointer-events: none;
			opacity: 0;
			background: #E8718E;
		}
		#flash.on {
			animation: flashfade 0.55s ease-out;
		}
		@keyframes flashfade {
			0% {
				opacity: 0.45;
			}
			100% {
				opacity: 0;
			}
		}
		#toasts {
			position: fixed;
			top: 78px;
			left: 0;
			right: 0;
			z-index: 5;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 8px;
			pointer-events: none;
		}
		.toast {
			font-family: var(--mono);
			font-size: 12px;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: #1A1206;
			background: var(--signal);
			padding: 7px 16px;
			animation: toastIn 2.2s ease forwards;
		}
		@keyframes toastIn {
			0% {
				opacity: 0;
				transform: translateY(-8px);
			}
			10% {
				opacity: 1;
				transform: none;
			}
			78% {
				opacity: 1;
			}
			100% {
				opacity: 0;
				transform: translateY(-4px);
			}
		}
		#mute {
			position: fixed;
			bottom: 16px;
			left: 18px;
			z-index: 4;
			font-family: var(--mono);
			font-size: 10px;
			letter-spacing: 0.18em;
			color: var(--faint);
		}

		@media (prefers-reduced-motion: reduce) {
			#live .dot,
			.overlay:not(.hidden),
			#flash.on,
			.toast {
				animation: none;
			}
			.cta {
				transition: none;
			}
			#flash.on {
				opacity: 0;
			}
		}

		/* compact layout for phones */
		@media (max-width: 640px) {
			.frame {
				inset: 8px;
			}
			#hud {
				top: 22px;
				left: 18px;
			}
			#hud .area {
				font-size: 30px;
			}
			#live {
				top: 22px;
				right: 18px;
			}
			#lb {
				top: 50px;
				right: 18px;
				min-width: 0;
				max-width: 44vw;
			}
			#lb .head {
				font-size: 9px;
				padding-bottom: 5px;
				margin-bottom: 5px;
			}
			#lb .row {
				flex-direction: row;
				align-items: baseline;
				font-size: 11px;
				line-height: 1.7;
				gap: 8px;
			}
			#lb .row .rk {
				width: 14px;
			}
			#lb .row .nm {
				max-width: 22vw;
			}
			#mini-wrap {
				right: 12px;
				bottom: 12px;
			}
			#mini {
				width: 104px;
				height: 104px;
			}
			#mute {
				display: none;
			}
			.overlay {
				padding: 0 26px;
			}
			.row {
				flex-direction: column;
				max-width: 360px;
			}
			.cta {
				width: 100%;
			}
		}
		</style>
	</head>
	<body>
		<canvas id="c"></canvas>
		<div class="vignette"></div>
		<div id="flash"></div>
		<div class="frame"><i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i></div>
		<div id="toasts"></div>
		<div id="mute" class="panel hidden">M · sound on</div>

		<div id="hud" class="panel hidden"></div>
		<div id="live" class="panel hidden"><span class="dot"></span>LIVE</div>
		<div id="lb" class="panel hidden"></div>
		<div id="mini-wrap" class="panel hidden">
			<div class="cap">Sector</div>
			<canvas id="mini" width="150" height="150"></canvas>
		</div>

		<div id="start" class="overlay">
			<div class="eyebrow">Freeform · Territory · Realtime</div>
			<h1 class="wordmark">d<span class="accent">o</span>dian</h1>
			<p
				class="tagline">Glide out, draw a loop, and the land inside is yours. Stray too far from home and you run blind.</p>
			<div class="row">
				<input id="name" class="field" maxlength="16" placeholder="enter call sign" autocomplete="off" />
				<button id="play" class="cta">Play</button>
			</div>
			<div id="starterr" class="err"></div>
		</div>

		<div id="killcam" class="killcam hidden"></div>
		<div id="dead" class="overlay hidden">
			<div class="eyebrow" id="deadeyebrow">Run ended</div>
			<h1 class="wordmark" id="deadtitle" style="font-size:clamp(40px,8vw,92px)">Eliminated</h1>
			<div id="deadreason" class="dead-reason hidden"></div>
			<div style="margin-top:38px;display:flex;gap:clamp(30px,9vw,64px);justify-content:center">
				<div>
					<div class="stat-label">Territory claimed</div>
					<div class="stat-num" id="deadscore">0</div>
				</div>
				<div>
					<div class="stat-label">Eliminations</div>
					<div class="stat-num" id="deadkills" style="color:var(--chalk)">0</div>
				</div>
			</div>
			<div class="row">
				<button id="watch" class="cta ghost hidden">Watch killcam</button>
				<button id="again" class="cta">Play again</button>
			</div>
		</div>

		<script>
		// ------------------------------------------------------------------ config
		// Pick the game-server WebSocket URL. Override with #ip=ws://host:port. In production the
		// page is served over https, so we must use secure wss:// (browsers block ws:// there) — we
		// connect to the same host at /ws, which the reverse proxy forwards to the game server. In
		// local dev (http) we connect straight to the game server on :9999.
		var WS_URL;
		var hashIp = location.hash.match(/ip=([^&]+)/);
		if (hashIp) {
			WS_URL = decodeURIComponent(hashIp[1]);
		} else if (location.protocol === "https:") {
			WS_URL = "wss://" + location.host + "/ws";
		} else {
			WS_URL = "ws://" + (location.hostname || "127.0.0.1") + ":9999/";
		}

		var TAU = Math.PI * 2;
		var SPEED = 0.012; // must match server PLAYER_TRAVEL_SPEED (else prediction rubber-bands)
		var POS_SCALE = 256;

		var S = {
			PLAYER_STATE: 2,
			PLAYER_DIE: 5,
			REMOVE_PLAYER: 7,
			PLAYER_NAME: 8,
			MY_SCORE: 9,
			MY_RANK: 10,
			LEADERBOARD: 11,
			MAP_SIZE: 12,
			MINIMAP: 14,
			PLAYER_SKIN: 15,
			READY: 17,
			SET_PLAYER_TRAIL: 4,
			SET_PLAYER_TERRITORY: 25,
		};
		var R = { UPDATE_MY_HEADING: 1, SET_USERNAME: 2, READY: 4, PROTOCOL_VERSION: 13 };

		// curated, harmonious player hues that read cleanly on deep ink (amber is reserved for UI)
		var PALETTE = [
			"#5BC8E8",
			"#7C8CFF",
			"#57D6A0",
			"#E8718E",
			"#B98BFF",
			"#6FE85B",
			"#FF9E6B",
			"#5BE8D0",
			"#8FA0B5",
			"#F26D6D",
			"#C0E85B",
		];
		function colorForId(id) {
			return PALETTE[id % PALETTE.length];
		}

		// ------------------------------------------------------------------ dom
		var canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
		var mini = document.getElementById("mini"), mctx = mini.getContext("2d");
		var hud = document.getElementById("hud"), lb = document.getElementById("lb");
		var liveEl = document.getElementById("live"), miniWrap = document.getElementById("mini-wrap");
		var startEl = document.getElementById("start"), deadEl = document.getElementById("dead");
		var killcamEl = document.getElementById("killcam");
		var nameEl = document.getElementById("name"), starterr = document.getElementById("starterr");
		function resize() {
			canvas.width = innerWidth;
			canvas.height = innerHeight;
			// Pin the displayed size to the backing size. The CSS uses 100vw/100vh, but on mobile
			// 100vh != innerHeight (the address bar), which would stretch the canvas and make touch
			// coordinates land off-target (the joystick would anchor away from the finger).
			canvas.style.width = innerWidth + "px";
			canvas.style.height = innerHeight + "px";
		}
		addEventListener("resize", resize);
		resize();

		// ------------------------------------------------------------------ state
		var ws = null, screenState = "start";
		var players = {}, territories = {}, names = {};
		var myScore = 0, myRank = 0, mapSize = 600, leaderboard = [];
		var TILE_PX = 11, targetPx = 11;
		var minimapGrid = new Uint8Array(80 * 80);
		var SPAWN_PROTECT_MS = 2500; // matches server SPAWN_PROTECTION_MS
		var captureFlash = 0, myKills = 0, spawnTime = 0, muted = false;
		var flashEl = document.getElementById("flash"),
			toastsEl = document.getElementById("toasts"),
			muteEl = document.getElementById("mute");

		function reset() {
			players = {};
			territories = {};
			names = {};
			myScore = 0;
			myRank = 0;
			leaderboard = [];
			TILE_PX = targetPx = 11;
			minimapGrid = new Uint8Array(80 * 80);
			captureFlash = 0;
			myKills = 0;
			joy.active = false;
			lastSentHeading = null;
			killcamId = null;
			if (killcamEl) killcamEl.classList.add("hidden");
		}

		// ---- audio: subtle Web Audio cues, context created on the first user gesture (Play) ----
		var actx = null;
		function audioInit() {
			if (!actx) {
				try {
					actx = new (window.AudioContext || window.webkitAudioContext)();
				} catch (_e) {}
			}
		}
		function blip(freq, dur, type, gain, slideTo) {
			if (muted || !actx) return;
			var o = actx.createOscillator(), g = actx.createGain();
			o.type = type || "sine";
			o.frequency.value = freq;
			if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, actx.currentTime + dur);
			g.gain.value = gain || 0.05;
			g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
			o.connect(g);
			g.connect(actx.destination);
			o.start();
			o.stop(actx.currentTime + dur);
		}
		function sndCapture() {
			blip(520, 0.16, "triangle", 0.05, 860);
		}
		function sndKill() {

			ctx.stroke();
			ctx.beginPath();
			ctx.moveTo(mouseX - rr - 4, mouseY);
			ctx.lineTo(mouseX - rr + 2, mouseY);
			ctx.moveTo(mouseX + rr - 2, mouseY);
			ctx.lineTo(mouseX + rr + 4, mouseY);
			ctx.moveTo(mouseX, mouseY - rr - 4);
			ctx.lineTo(mouseX, mouseY - rr + 2);
			ctx.moveTo(mouseX, mouseY + rr - 2);
			ctx.lineTo(mouseX, mouseY + rr + 4);
			ctx.stroke();
			ctx.fillStyle = "rgba(242,180,92,0.95)";
			ctx.beginPath();
			ctx.arc(mouseX, mouseY, 1.6, 0, TAU);
			ctx.fill();
			}
			}

			var coords = me && me.pos ? ("X " + me.pos.x.toFixed(0) + " · Y " + me.pos.y.toFixed(0)) : "—";
			hud.innerHTML = "<div class='lbl'>dodian.org</div><div class='area'>" + myScore + "</div>" +
				"<div class='meta'>" + (myRank ? "Rank <b>#" + myRank + "</b> · " : "") + coords + "</div>";
			drawLeaderboard();
			drawMinimap();
		}

		// Floating joystick overlay (touch): a faint base ring at the touch origin and a solid amber
		// thumb knob at the (clamped) finger position, joined by a direction line. Drawn in screen space.
		function drawJoystick() {
			var dx = joy.x - joy.ox, dy = joy.y - joy.oy;
			var dist = Math.sqrt(dx * dx + dy * dy);
			var reach = Math.min(dist, JOY_BASE_R);
			var tx = dist > 0.0001 ? joy.ox + (dx / dist) * reach : joy.ox;
			var ty = dist > 0.0001 ? joy.oy + (dy / dist) * reach : joy.oy;
			ctx.fillStyle = "rgba(242,180,92,0.05)";
			ctx.strokeStyle = "rgba(242,180,92,0.30)";
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.arc(joy.ox, joy.oy, JOY_BASE_R, 0, TAU);
			ctx.fill();
			ctx.stroke();
			if (dist > JOY_DEADZONE) {
				ctx.strokeStyle = "rgba(242,180,92,0.28)";
				ctx.lineWidth = 1.5;
				ctx.beginPath();
				ctx.moveTo(joy.ox, joy.oy);
				ctx.lineTo(tx, ty);
				ctx.stroke();
			}
			ctx.fillStyle = "rgba(242,180,92,0.92)";
			ctx.strokeStyle = "rgba(13,17,23,0.55)";
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.arc(tx, ty, 20, 0, TAU);
			ctx.fill();
			ctx.stroke();
		}

		// Radar contact: a hollow ring with a glowing tick on the leading edge marking which way the
		// player faces. Reads like a sonar/radar contact — instrument-like, no chunky shape. Own player
		// uses the amber accent; others use their colour with a bright chalk tick.
		function drawMarker(x, y, heading, color, isMe) {
			var r = Math.max(5, TILE_PX * (isMe ? 0.7 : 0.58));
			var rim = isMe ? "#F2B45C" : color;
			var tick = isMe ? "#F2B45C" : "#ECF1F5";
			ctx.save();
			ctx.translate(x, y);
			// dark glass core so the ring reads as hollow even on same-colour territory
			ctx.beginPath();
			ctx.arc(0, 0, r, 0, TAU);
			ctx.fillStyle = "rgba(9,13,19,0.62)";
			ctx.fill();
			ctx.lineWidth = 2.2;
			ctx.strokeStyle = rim;
			ctx.stroke();
			// glowing leading tick = facing direction
			ctx.beginPath();
			ctx.arc(Math.cos(heading) * r, Math.sin(heading) * r, Math.max(2, r * 0.3), 0, TAU);
			ctx.shadowColor = tick;
			ctx.shadowBlur = 7;
			ctx.fillStyle = tick;
			ctx.fill();
			ctx.shadowBlur = 0;
			// spawn-protection shield (own player only, fades over the protection window)
			if (isMe) {
				var pt = performance.now() - spawnTime;
				if (pt >= 0 && pt < SPAWN_PROTECT_MS) {
					ctx.beginPath();
					ctx.arc(0, 0, r + 5, 0, TAU);
					ctx.strokeStyle = "rgba(242,180,92," + (0.45 * (1 - pt / SPAWN_PROTECT_MS)).toFixed(3) + ")";
					ctx.lineWidth = 2;
					ctx.stroke();
				}
			}
			ctx.restore();
		}

		function drawLeaderboard() {
			if (!leaderboard.length) {
				lb.innerHTML = "";
				return;
			}
			var myName = nameEl.value.trim();
			var maxRows = innerWidth <= 640 ? 5 : 8; // keep the panel small on phones
			var html = "<div class='head'>Standings</div>";
			for (var i = 0; i < Math.min(maxRows, leaderboard.length); i++) {
				var e = leaderboard[i];
				var me = myName && e.name === myName ? " me" : "";
				html += "<div class='row" + me + "'><span class='rk'>" + (i + 1) + "</span>" +
					"<span class='nm'>" + escapeHtml(e.name || "—") + "</span><span class='sc'>" + e.score + "</span></div>";
			}
			lb.innerHTML = html;
		}
		function escapeHtml(s) {
			return s.replace(/[&<>"]/g, function (c) {
				return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
			});
		}

		function drawMinimap() {
			mctx.clearRect(0, 0, 150, 150);
			mctx.fillStyle = "rgba(8,12,18,0.6)";
			mctx.fillRect(0, 0, 150, 150);
			var cell = 150 / 80;
			mctx.fillStyle = "rgba(133,147,163,0.5)";
			for (var gy = 0; gy < 80; gy++) {
				for (var gx = 0; gx < 80; gx++) {
					if (minimapGrid[gy * 80 + gx]) mctx.fillRect(gx * cell, gy * cell, Math.ceil(cell), Math.ceil(cell));
				}
			}
			// Only your own position is marked — the minimap shows claimed land, not where other
			// players are (keeping enemy positions hidden fits the limited-vision design).
			var me = players[0];
			if (me && me.pos) {
				var s = 150 / mapSize;
				mctx.fillStyle = "#F2B45C";
				mctx.beginPath();
				mctx.arc(me.pos.x * s, me.pos.y * s, 3, 0, TAU);
				mctx.fill();
			}
		}

		// ------------------------------------------------------------------ start
		function startGame() {
			audioInit();
			starterr.textContent = "";
			var n = nameEl.value.trim();
			saveCallsign(n);
			connect(n);
		}
		document.getElementById("play").addEventListener("click", startGame);
		nameEl.addEventListener("keydown", function (e) {
			if (e.key === "Enter") startGame();
		});
		document.getElementById("again").addEventListener("click", function () {
			audioInit();
			connect(nameEl.value.trim());
		});
		document.getElementById("watch").addEventListener("click", function () {
			// Resume watching the killer from the game-over screen (indefinitely; tap to return).
			if (killcamId !== null && players[killcamId]) startKillcam(false);
		});
		// Remember the player's call sign between visits (localStorage may be unavailable in private mode).
		var CALLSIGN_KEY = "dodian.callsign";
		function saveCallsign(n) {
			try {
				if (n) localStorage.setItem(CALLSIGN_KEY, n);
			} catch (_e) { /* storage blocked */ }
		}
		try {
			var savedCallsign = localStorage.getItem(CALLSIGN_KEY);
			if (savedCallsign) nameEl.value = savedCallsign;
		} catch (_e) { /* storage blocked */ }

		if (!nameEl.value) nameEl.focus();
		requestAnimationFrame(frame);
		</script>
	</body>
</html>
